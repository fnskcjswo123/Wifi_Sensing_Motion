# use sudo nano /etc/hostapd/hostapd.conf

interface=wlan0
driver=nl80211
ssid=Raspberrypi_15
# you must change this
hw_mode=g
channel=6
wmm_enabled=0
macaddr_acl=0
auth_algs=1
ignore_broadcast_ssid=0
wpa=2
wpa_passphrase=asdf1234
# same with ssid
wpa_key_mgmt=WPA-PSK
wpa_pairwise=TKIP
# CCMP might be better i think
rsn_pairwise=CCMP
